worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # ─── Rate limiting ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # ─── Gzip ───────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1000;

    # ─── API Server ─────────────────────────────────────────
    # El HTTPS lo maneja Cloudflare Tunnel — nginx escucha solo en HTTP interno
    server {
        listen 80;
        server_name _;

        # ─── Headers de seguridad ─────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ─── CORS ─────────────────────────────────────────
        set $cors_origin "";
        if ($http_origin ~* "^https://(josthom-eco-resort\.vercel\.app|.*\.vercel\.app|josthom-eco-resort\.com|www\.josthom-eco-resort\.com)$") {
            set $cors_origin $http_origin;
        }

        # ─── Auth (rate limit estricto) ───────────────────
        location ~ ^/api/(auth|token) {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        # ─── Webhook Mercado Pago ─────────────────────────
        location /api/payments/webhook/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ─── API General ──────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        # ─── Health check ─────────────────────────────────
        location /health {
            proxy_pass http://api:8000;
            access_log off;
        }

        # ─── Docs API ─────────────────────────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
        }
    }
}
