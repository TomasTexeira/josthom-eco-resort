worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # ─── Rate limiting ──────────────────────────────────────
    # Límite global: 20 req/s por IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    # Límite estricto para auth: 5 req/min
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # ─── Gzip ───────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1000;

    # ─── Redirect HTTP → HTTPS ──────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── API Server (HTTPS) ─────────────────────────────────
    server {
        listen 443 ssl http2;
        # REEMPLAZAR con tu dominio real (ej: api.josthom.com.ar)
        server_name api.josthom.com.ar;

        # Certificados SSL (ver instrucciones en README_NAS.md)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ─── Headers de seguridad ─────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ─── CORS (solo permite el frontend en Vercel) ────
        # Ajustar si usás dominio propio
        set $cors_origin "";
        if ($http_origin ~* "^https://(josthom-eco-resort\.vercel\.app|.*\.vercel\.app|josthom\.com\.ar)$") {
            set $cors_origin $http_origin;
        }

        # ─── Endpoints de Auth (rate limit estricto) ──────
        location ~ ^/api/(auth|token) {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        # ─── Webhook Mercado Pago (sin rate limit, MP lo llama) ──
        location /api/webhooks/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── API General ──────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        # ─── Docs API (solo en dev, comentar en prod) ─────
        location ~ ^/(docs|redoc|openapi.json) {
            # Descomentar para deshabilitar en producción:
            # return 403;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
        }

        # ─── Health check ─────────────────────────────────
        location /health {
            proxy_pass http://api:8000;
            access_log off;
        }
    }
}
