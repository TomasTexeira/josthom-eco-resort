version: "3.9"

# =========================================================
# Josthom Eco Resort - Docker Compose (Synology NAS)
# Ejecutar: docker compose up -d
# =========================================================

services:

  # ─── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: josthom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: josthom
      POSTGRES_USER: josthom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - josthom-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U josthom"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: josthom-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - josthom-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI ────────────────────────────────────────────
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: josthom-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://josthom:${POSTGRES_PASSWORD}@postgres:5432/josthom
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      # Mercado Pago
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET}
      # Notificaciones
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM:-reservas@josthom.com.ar}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      # Frontend
      FRONTEND_URL: ${FRONTEND_URL:-https://josthom-eco-resort.vercel.app}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_WHATSAPP: ${ADMIN_WHATSAPP:-5491138323695}
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - josthom-net

  # ─── Celery Worker (notificaciones async) ───────────────
  celery-worker:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: josthom-celery-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://josthom:${POSTGRES_PASSWORD}@postgres:5432/josthom
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM:-reservas@josthom.com.ar}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_WHATSAPP: ${ADMIN_WHATSAPP:-5491138323695}
      FRONTEND_URL: ${FRONTEND_URL:-https://josthom-eco-resort.vercel.app}
    depends_on:
      - api
      - redis
      - postgres
    networks:
      - josthom-net

  # ─── Celery Beat (tareas programadas) ───────────────────
  celery-beat:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: josthom-celery-beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      DATABASE_URL: postgresql+asyncpg://josthom:${POSTGRES_PASSWORD}@postgres:5432/josthom
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    networks:
      - josthom-net

  # ─── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: josthom-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - josthom-net

networks:
  josthom-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  api_uploads:
  nginx_logs:
